name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Test
        run: go test ./... -v

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binary
        run: |
          VERSION=$(cat VERSION)
          go build -ldflags "-s -w -X main.version=${VERSION}" -o clorch ./cmd/clorch

      - name: Verify binary
        run: ./clorch version
